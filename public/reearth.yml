id: reearth-visualizer-plugin-legend-panel
name: Legend Panel
version: 0.0.1
extensions:
  - id: legend_panel
    type: widget
    name: Legend Panel
    schema:
      groups:
        - id: general
          title: General
          fields:
            - id: show_panel_title
              title: Show panel title
              type: bool
              defaultValue: true
            - id: panel_title
              title: Panel title
              type: string
              availableIf:
                field: show_panel_title
                type: bool
                value: true
            - id: panel_title_icon
              title: Panel title icon
              type: url
              ui: image
              availableIf:
                field: show_panel_title
                type: bool
                value: true
        - id: legend_items
          list: true
          title: Legend Items
          representativeField: item_text
          fields:
            - id: item_type
              type: string
              title: Item type
              defaultValue: legend
              choices:
                - key: legend
                  label: Legend
                - key: subtitle
                  label: Subtitle
            - id: item_text
              type: string
              title: Item text
            - id: legend_symbol_color
              type: string
              title: Legend symbol color
              ui: color
              availableIf:
                field: item_type
                type: string
                value: legend
            - id: legend_symbol_image
              type: url
              title: Legend symbol image
              ui: image
              availableIf:
                field: item_type
                type: string
                value: legend
        - id: appearance
          title: Appearance
          fields:
            - id: size
              title: Size
              type: string
              defaultValue: medium
              choices:
                - key: small
                  label: Small
                - key: medium
                  label: Medium
                - key: large
                  label: Large
            - id: width
              title: Width
              type: number
              unit: px
              description: Custom width (overrides size default)
            - id: background_color
              title: Background color
              type: string
              ui: color
            - id: corner_radius
              title: Corner radius
              type: number
              unit: px
            - id: show_border
              title: Show border
              type: bool
              defaultValue: false
            - id: border_color
              title: Border color
              type: string
              ui: color
              availableIf:
                field: show_border
                type: bool
                value: true
            - id: border_width
              title: Border width
              type: number
              unit: px
              availableIf:
                field: show_border
                type: bool
                value: true
